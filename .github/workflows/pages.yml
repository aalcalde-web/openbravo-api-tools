name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate data
        run: |
          python3 api-field-reference/generate.py
          python3 undocumented-fields/generate.py

      - name: Assemble site
        run: |
          mkdir -p _site/portal
          cp -r portal/* _site/portal/
          mkdir -p _site/api-field-reference/public
          cp -r api-field-reference/public/* _site/api-field-reference/public/
          mkdir -p _site/undocumented-fields/public
          cp -r undocumented-fields/public/* _site/undocumented-fields/public/
          mkdir -p _site/tools/public
          cp -r tools/public/* _site/tools/public/
          mkdir -p _site/get-to-post-converter/public
          cp -r get-to-post-converter/public/* _site/get-to-post-converter/public/
          mkdir -p _site/get-to-post-converter/data
          cp get-to-post-converter/data/schemas.json _site/get-to-post-converter/data/
          echo '<meta http-equiv="refresh" content="0;url=portal/">' > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
