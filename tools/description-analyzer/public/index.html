<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Description Analyzer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📝 Field Description Analyzer</h1>
      <p class="subtitle">Compara descripciones Swagger con el comportamiento real del código</p>
    </header>

    <div class="api-label" id="api-label"></div>

    <div class="status" id="status">
      <div class="spinner"></div>
      <span id="status-text">Analizando...</span>
    </div>

    <div class="results hidden" id="results">
      <div class="stats" id="stats"></div>
      <button id="btn-download" class="btn-download">⬇ Descargar CSV</button>
    </div>

    <div class="error hidden" id="error"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
